<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Motif tenun Lipa Sabbe Bugis — diamond lattice & songket -->
  <defs>
    <pattern id="lipaSabbe" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Outer diamond -->
      <path d="M30 2 L58 30 L30 58 L2 30 Z" fill="none" stroke="#C7A15A" stroke-width="1.1" opacity="0.55"/>
      <!-- Inner diamond -->
      <path d="M30 12 L48 30 L30 48 L12 30 Z" fill="none" stroke="#C7A15A" stroke-width="0.7" opacity="0.4"/>
      <!-- Core -->
      <path d="M30 20 L40 30 L30 40 L20 30 Z" fill="#C7A15A" opacity="0.12"/>
      <circle cx="30" cy="30" r="2.2" fill="#C7A15A" opacity="0.45"/>
      <!-- Cross weave lines -->
      <line x1="0" y1="30" x2="12" y2="30" stroke="#C7A15A" stroke-width="0.5" opacity="0.3"/>
      <line x1="48" y1="30" x2="60" y2="30" stroke="#C7A15A" stroke-width="0.5" opacity="0.3"/>
      <line x1="30" y1="0" x2="30" y2="12" stroke="#C7A15A" stroke-width="0.5" opacity="0.3"/>
      <line x1="30" y1="48" x2="30" y2="60" stroke="#C7A15A" stroke-width="0.5" opacity="0.3"/>
      <!-- Corner ticks like songket -->
      <path d="M8 8 L14 8 L8 14 Z" fill="#C7A15A" opacity="0.2"/>
      <path d="M52 8 L46 8 L52 14 Z" fill="#C7A15A" opacity="0.2"/>
      <path d="M8 52 L14 52 L8 46 Z" fill="#C7A15A" opacity="0.2"/>
      <path d="M52 52 L46 52 L52 46 Z" fill="#C7A15A" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="120" height="120" fill="url(#lipaSabbe)"/>
</svg>
